name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build & Upload
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: pulzr
            asset: pulzr-linux-amd64
            use_zigbuild: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: pulzr
            asset: pulzr-linux-arm64
            use_zigbuild: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: pulzr.exe
            asset: pulzr-windows-amd64.exe
            use_zigbuild: false
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: pulzr
            asset: pulzr-macos-amd64
            use_zigbuild: false
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: pulzr
            asset: pulzr-macos-arm64
            use_zigbuild: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1.13.0
        with:
          toolchain: stable

      - name: Install target
        run: rustup target add ${{ matrix.target }}

      - name: Setup Zig
        if: matrix.use_zigbuild
        uses: mlugg/setup-zig@v2
        with:
          version: latest

      - name: Install cargo-zigbuild
        if: matrix.use_zigbuild
        run: cargo install --locked cargo-zigbuild

      - name: Build with zigbuild
        if: matrix.use_zigbuild
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Build with cargo
        if: ${{ !matrix.use_zigbuild }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload to GitHub Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: target/${{ matrix.target }}/release/${{ matrix.artifact }}
          asset_name: ${{ matrix.asset }}
          tag: ${{ github.ref }}
